<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System - PracticalQuiz3</title>
  <script src="script/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <a-scene>

    <!-- ===== ASSETS ===== -->
    <a-assets timeout="10000">
      <img id="sun-tex"          src="texture/2k_sun.jpg">
      <img id="mercury-tex"      src="texture/2k_mercury.jpg">
      <img id="venus-tex"        src="texture/2k_venus_atmosphere.jpg">
      <img id="earth-tex"        src="texture/2k_earth_daymap.jpg">
      <img id="moon-tex"         src="texture/2k_moon.jpg">
      <img id="mars-tex"         src="texture/2k_mars.jpg">
      <img id="jupiter-tex"      src="texture/2k_jupiter.jpg">
      <img id="saturn-tex"       src="texture/2k_saturn.jpg">
      <img id="saturn-ring-tex"  src="texture/2k_saturn_ring_alpha.png">
      <img id="uranus-tex"       src="texture/2k_uranus.jpg">
      <img id="neptune-tex"      src="texture/2k_neptune.jpg">
      <img id="milkyway-tex"     src="texture/2k_stars_milky_way.jpg">
    </a-assets>

    <!-- ===== SKY (Milky Way background) ===== -->
    <a-sky src="#milkyway-tex" radius="5000"></a-sky>

    <!-- ===== LIGHTING ===== -->
    <!-- Sun emits light outward -->
    <a-light type="point" position="0 0 0" color="#FFF8E7" intensity="3" distance="800" decay="1"></a-light>
    <!-- Subtle ambient so far planets aren't pitch black -->
    <a-light type="ambient" color="#111111" intensity="1"></a-light>

    <!-- ===== SUN ===== -->
    <a-sphere position="0 0 0" radius="3"
              material="src: #sun-tex; shader: flat"
              animation="property: rotation; from: 0 0 0; to: 0 360 0;
                         loop: true; dur: 20000; easing: linear">
    </a-sphere>

    <!-- ===== ORBIT RINGS (visual guides) ===== -->
    <a-torus position="0 0 0" radius="6"    radius-tubular="0.02" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="9.5"  radius-tubular="0.02" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="13"   radius-tubular="0.02" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="18"   radius-tubular="0.02" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="26"   radius-tubular="0.03" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="36"   radius-tubular="0.03" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="46"   radius-tubular="0.03" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>
    <a-torus position="0 0 0" radius="56"   radius-tubular="0.03" rotation="90 0 0" material="color: #ffffff; opacity: 0.15; transparent: true; shader: flat"></a-torus>

    <!-- ===== MERCURY ===== -->
    <!-- Orbital period: ~88 Earth days → fastest revolution -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 7000; easing: linear">
      <a-sphere position="6 0 0" radius="0.25"
                material="src: #mercury-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 4000; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== VENUS ===== -->
    <!-- Orbital period: ~225 Earth days -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 18000; easing: linear">
      <a-sphere position="9.5 0 0" radius="0.45"
                material="src: #venus-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 6000; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== EARTH + MOON ===== -->
    <!-- Orbital period: 365 days -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 30000; easing: linear">
      <!-- Earth sphere -->
      <a-sphere position="13 0 0" radius="0.5"
                material="src: #earth-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 5000; easing: linear">
      </a-sphere>
      <!-- Moon pivot (centred on Earth's position) -->
      <a-entity position="13 0 0"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 5000; easing: linear">
        <a-sphere position="1.1 0 0" radius="0.13"
                  material="src: #moon-tex">
        </a-sphere>
      </a-entity>
    </a-entity>

    <!-- ===== MARS ===== -->
    <!-- Orbital period: ~687 Earth days -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 56000; easing: linear">
      <a-sphere position="18 0 0" radius="0.35"
                material="src: #mars-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 6000; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== JUPITER ===== -->
    <!-- Orbital period: ~12 Earth years → slow -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 120000; easing: linear">
      <a-sphere position="26 0 0" radius="1.4"
                material="src: #jupiter-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 3500; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== SATURN + RINGS ===== -->
    <!-- Orbital period: ~29 Earth years -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 260000; easing: linear">
      <!-- Group Saturn body + rings together -->
      <a-entity position="36 0 0">
        <!-- Saturn body -->
        <a-sphere radius="1.1"
                  material="src: #saturn-tex"
                  animation="property: rotation; from: 0 0 0; to: 0 360 0;
                             loop: true; dur: 4000; easing: linear">
        </a-sphere>
        <!-- Ring disc (tilted slightly for visual effect) -->
        <a-ring radius-inner="1.55" radius-outer="2.9"
                rotation="-78 0 0"
                material="src: #saturn-ring-tex; side: double; transparent: true; opacity: 0.9; shader: flat">
        </a-ring>
      </a-entity>
    </a-entity>

    <!-- ===== URANUS ===== -->
    <!-- Orbital period: ~84 Earth years -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 500000; easing: linear">
      <a-sphere position="46 0 0" radius="0.75"
                material="src: #uranus-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 6000; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== NEPTUNE ===== -->
    <!-- Orbital period: ~165 Earth years → slowest -->
    <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0;
                          loop: true; dur: 800000; easing: linear">
      <a-sphere position="56 0 0" radius="0.7"
                material="src: #neptune-tex"
                animation="property: rotation; from: 0 0 0; to: 0 360 0;
                           loop: true; dur: 6500; easing: linear">
      </a-sphere>
    </a-entity>

    <!-- ===== PLANET LABELS ===== -->
    <a-text value="SUN"     position="0 3.8 0"    align="center" color="#ffdd88" width="3" shader="flat"></a-text>
    <a-text value="Mercury" position="6 0.6 0"    align="center" color="#cccccc" width="2" shader="flat"></a-text>
    <a-text value="Venus"   position="9.5 0.8 0"  align="center" color="#ffcc88" width="2" shader="flat"></a-text>
    <a-text value="Earth"   position="13 0.8 0"   align="center" color="#88ccff" width="2" shader="flat"></a-text>
    <a-text value="Mars"    position="18 0.7 0"   align="center" color="#ff8866" width="2" shader="flat"></a-text>
    <a-text value="Jupiter" position="26 2.2 0"   align="center" color="#ddbbaa" width="2" shader="flat"></a-text>
    <a-text value="Saturn"  position="36 2.4 0"   align="center" color="#eeddaa" width="2" shader="flat"></a-text>
    <a-text value="Uranus"  position="46 1.5 0"   align="center" color="#aaddee" width="2" shader="flat"></a-text>
    <a-text value="Neptune" position="56 1.4 0"   align="center" color="#6688ff" width="2" shader="flat"></a-text>

    <!-- ===== CAMERA ===== -->
    <!-- Position directly on a-camera to avoid defaulting to origin -->
    <a-camera position="0 35 85" rotation="-22 0 0"
              look-controls wasd-controls fov="75">
      <a-cursor color="#ffffff" opacity="0.5"></a-cursor>
    </a-camera>

  </a-scene>
</body>
</html>
