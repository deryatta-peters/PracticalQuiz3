<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System - PracticalQuiz3</title>
  <script src="script/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #controls-hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #ccc;
      font-family: monospace;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="controls-hint">
  🖱 Drag to look &nbsp;|&nbsp; W/S or ↑/↓ = move forward/back &nbsp;|&nbsp;
  A/D or ←/→ = strafe &nbsp;|&nbsp; Q/E = up/down &nbsp;|&nbsp; Hold Shift = faster
</div>

<a-scene>

  <!-- ASSETS -->
  <a-assets timeout="15000">
    <img id="sun-tex"         src="texture/2k_sun.jpg">
    <img id="mercury-tex"     src="texture/2k_mercury.jpg">
    <img id="venus-tex"       src="texture/2k_venus_atmosphere.jpg">
    <img id="earth-tex"       src="texture/2k_earth_daymap.jpg">
    <img id="moon-tex"        src="texture/2k_moon.jpg">
    <img id="mars-tex"        src="texture/2k_mars.jpg">
    <img id="jupiter-tex"     src="texture/2k_jupiter.jpg">
    <img id="saturn-tex"      src="texture/2k_saturn.jpg">
    <img id="saturn-ring-tex" src="texture/2k_saturn_ring_alpha.png">
    <img id="uranus-tex"      src="texture/2k_uranus.jpg">
    <img id="neptune-tex"     src="texture/2k_neptune.jpg">
    <img id="milkyway-tex"    src="texture/2k_stars_milky_way.jpg">
  </a-assets>

  <!-- SKY -->
  <a-sky src="#milkyway-tex" radius="5000"></a-sky>

  <!-- LIGHTING -->
  <a-light type="point" position="0 0 0" color="#FFF8E7" intensity="2.5" distance="500" decay="1"></a-light>
  <a-light type="ambient" color="#222222" intensity="1"></a-light>

  <!-- SUN -->
  <a-sphere position="0 0 0" radius="3"
            material="src:#sun-tex; shader:flat; emissive:#ff8800; emissiveIntensity:0.4"
            animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:20000; easing:linear">
  </a-sphere>

  <!-- ORBIT RINGS -->
  <a-torus position="0 0 0" radius="6"  radius-tubular="0.025" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="10" radius-tubular="0.025" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="14" radius-tubular="0.025" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="19" radius-tubular="0.025" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="27" radius-tubular="0.035" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="37" radius-tubular="0.035" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="47" radius-tubular="0.035" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>
  <a-torus position="0 0 0" radius="57" radius-tubular="0.035" rotation="90 0 0" material="color:#fff; opacity:0.12; transparent:true; shader:flat"></a-torus>

  <!-- MERCURY -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:7000; easing:linear">
    <a-sphere position="6 0 0" radius="0.28" material="src:#mercury-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:4000; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- VENUS -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:18000; easing:linear">
    <a-sphere position="10 0 0" radius="0.48" material="src:#venus-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:6000; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- EARTH WITH  MOON -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:30000; easing:linear">
    <a-sphere position="14 0 0" radius="0.52" material="src:#earth-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:5000; easing:linear">
    </a-sphere>
    <a-entity position="14 0 0"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:5000; easing:linear">
      <a-sphere position="1.1 0 0" radius="0.14" material="src:#moon-tex"></a-sphere>
    </a-entity>
  </a-entity>

  <!-- MARS -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:56000; easing:linear">
    <a-sphere position="19 0 0" radius="0.37" material="src:#mars-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:6000; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- JUPITER -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:120000; easing:linear">
    <a-sphere position="27 0 0" radius="1.45" material="src:#jupiter-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:3500; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- SATURN WITH RINGS -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:260000; easing:linear">
    <a-entity position="37 0 0">
      <a-sphere radius="1.15" material="src:#saturn-tex"
                animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:4000; easing:linear">
      </a-sphere>
      <a-ring radius-inner="1.6" radius-outer="3.0" rotation="-78 0 0"
              material="src:#saturn-ring-tex; side:double; transparent:true; opacity:0.9; shader:flat">
      </a-ring>
    </a-entity>
  </a-entity>

  <!-- URANUS -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:500000; easing:linear">
    <a-sphere position="47 0 0" radius="0.78" material="src:#uranus-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:6000; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- NEPTUNE -->
  <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:800000; easing:linear">
    <a-sphere position="57 0 0" radius="0.72" material="src:#neptune-tex"
              animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:6500; easing:linear">
    </a-sphere>
  </a-entity>

  <!-- LABELS -->
  <a-text value="SUN"     position="0 4.2 0"   align="center" color="#ffdd88" width="3"   shader="flat"></a-text>
  <a-text value="Mercury" position="6 0.7 0"   align="center" color="#cccccc" width="2"   shader="flat"></a-text>
  <a-text value="Venus"   position="10 0.9 0"  align="center" color="#ffcc88" width="2"   shader="flat"></a-text>
  <a-text value="Earth"   position="14 0.9 0"  align="center" color="#88ccff" width="2"   shader="flat"></a-text>
  <a-text value="Mars"    position="19 0.8 0"  align="center" color="#ff8866" width="2"   shader="flat"></a-text>
  <a-text value="Jupiter" position="27 2.3 0"  align="center" color="#ddbbaa" width="2.5" shader="flat"></a-text>
  <a-text value="Saturn"  position="37 2.5 0"  align="center" color="#eeddaa" width="2.5" shader="flat"></a-text>
  <a-text value="Uranus"  position="47 1.6 0"  align="center" color="#aaddee" width="2.5" shader="flat"></a-text>
  <a-text value="Neptune" position="57 1.5 0"  align="center" color="#6688ff" width="2.5" shader="flat"></a-text>

  <!-- CAMERA -->
  <a-camera position="0 40 90" rotation="-24 0 0"
            look-controls="pointerLockEnabled: false"
            wasd-controls="acceleration: 50"
            fov="70">
    <a-cursor color="#ffffff" opacity="0.4" fuse="false"></a-cursor>
  </a-camera>

</a-scene>



</body>
</html>
